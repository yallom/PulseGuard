services:
  backend:
    build: ./services/backend
    container_name: pulseguard_backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
    volumes:
      - ./services/backend:/app
      - /app/node_modules
    networks:
      - net

  web:
    build: 
      context: ./services/web
    container_name: pulseguard_web
    ports:
      - "5173:5173"
    volumes:
      - ./services/web:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - net
  db:
    image: postgres:15
    container_name: pulseguard_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - net

volumes:
  pgdata:

networks:
  net:
    driver: bridge